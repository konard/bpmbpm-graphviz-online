<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphviz Online — поддержка image=</title>

  <!-- Ядро @viz-js/viz — тот же движок, что используется в family-tree/ver2 -->
  <!-- Обеспечивает корректный рендеринг узлов с атрибутом image= через опцию images -->
  <script src="https://unpkg.com/@viz-js/viz@3.4.0/lib/viz-standalone.js"></script>

  <style>
    /* Основные стили страницы */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 8px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 8px 0;
      color: #333;
    }

    /* Область редактора: слева — текст, справа — граф */
    #layout {
      display: flex;
      gap: 8px;
      height: calc(100vh - 80px);
    }

    /* Левая панель: редактор кода dot */
    #editor-panel {
      display: flex;
      flex-direction: column;
      width: 380px;
      min-width: 200px;
      flex-shrink: 0;
    }

    #dot-editor {
      flex: 1;
      resize: none;
      font-family: "Courier New", monospace;
      font-size: 13px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }

    /* Кнопки управления */
    #controls {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    #btn-render {
      background: #4CAF50;
      color: white;
    }

    #btn-render:hover {
      background: #388E3C;
    }

    #btn-share {
      background: #2196F3;
      color: white;
    }

    #btn-share:hover {
      background: #1565C0;
    }

    #btn-download {
      background: #FF9800;
      color: white;
    }

    #btn-download:hover {
      background: #E65100;
    }

    /* Выпадающий список выбора движка */
    #engine-select {
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      background: #fff;
    }

    /* Сообщения об ошибках */
    #error-msg {
      color: #c00;
      font-size: 12px;
      margin-top: 4px;
      min-height: 16px;
    }

    /* Правая панель: область отображения SVG-графа */
    #graph-panel {
      flex: 1;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Контейнер с прокруткой для SVG */
    #graph-scroll {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    /* Контейнер SVG внутри правой панели */
    #graph {
      display: inline-block;
      min-width: 100%;
      min-height: 100%;
      padding: 8px;
    }

    /* Панель управления масштабом (внизу правой панели) */
    #zoom-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }

    #zoom-controls button {
      padding: 4px 10px;
      background: #e0e0e0;
      color: #333;
      font-size: 14px;
      min-width: 32px;
    }

    #zoom-controls button:hover {
      background: #bdbdbd;
    }

    #zoom-level {
      font-size: 13px;
      color: #555;
      min-width: 42px;
      text-align: center;
    }

    /* Подсказка о ссылке */
    #share-hint {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      word-break: break-all;
    }
  </style>
</head>
<body>

<h1>Graphviz Online — поддержка URL-параметра и тега image="</h1>

<div id="layout">

  <!-- Левая панель: редактор dot-кода -->
  <div id="editor-panel">
    <textarea id="dot-editor" spellcheck="false"></textarea>

    <div id="controls">
      <!-- Выбор движка Graphviz (dot, neato, fdp, sfdp, circo, twopi) -->
      <select id="engine-select" title="Движок Graphviz">
        <option value="dot" selected>dot</option>
        <option value="neato">neato</option>
        <option value="fdp">fdp</option>
        <option value="sfdp">sfdp</option>
        <option value="circo">circo</option>
        <option value="twopi">twopi</option>
      </select>

      <!-- Кнопка: отрисовать граф -->
      <button id="btn-render" onclick="zapustit()">Отрисовать</button>

      <!-- Кнопка: сформировать ссылку с текущим кодом dot -->
      <button id="btn-share" onclick="sozdat_ssylku()">Получить ссылку</button>

      <!-- Кнопка: скачать SVG -->
      <button id="btn-download" onclick="skachat_svg()">Скачать SVG</button>
    </div>

    <!-- Область для сообщения об ошибке при рендеринге -->
    <div id="error-msg"></div>

    <!-- Подсказка: сгенерированная ссылка -->
    <div id="share-hint"></div>
  </div>

  <!-- Правая панель: граф -->
  <div id="graph-panel">
    <div id="graph-scroll">
      <div id="graph"></div>
    </div>
    <!-- Элементы управления масштабом (как в dreampuf.github.io/GraphvizOnline) -->
    <div id="zoom-controls">
      <button onclick="izmenity_masshtab(0.1)" title="Увеличить">+</button>
      <span id="zoom-level">100%</span>
      <button onclick="izmenity_masshtab(-0.1)" title="Уменьшить">−</button>
      <button onclick="sbrosit_masshtab()" title="Сбросить масштаб">Сброс</button>
      <button onclick="vpisat_v_okno()" title="Вписать в окно">Вписать</button>
    </div>
  </div>

</div>

<script>
  // ========================================================
  // Текущий масштаб отображения графа
  // ========================================================
  var tekuschiy_masshtab = 1.0;

  // ========================================================
  // Пример кода dot по умолчанию (без изображений)
  // Используется если в URL не передан параметр с кодом
  // ========================================================
  var DOT_PO_UMOLCHANIYU = 'digraph G {\n  rankdir=LR;\n  node [shape=box];\n  A -> B -> C;\n  A -> C;\n}';

  // ========================================================
  // Читаем код dot из URL-параметра при загрузке страницы
  // Поддерживаемый формат: ?dot=<URL-encoded DOT code>
  // или хэш: #<URL-encoded DOT code>
  // ========================================================
  function poluchit_dot_iz_url() {
    // Сначала проверяем GET-параметр ?dot=...
    var params = new URLSearchParams(window.location.search);
    var dotIzParams = params.get('dot');
    if (dotIzParams) {
      return dotIzParams;
    }

    // Затем проверяем хэш (fragment): #...
    var hash = window.location.hash;
    if (hash && hash.length > 1) {
      // Убираем символ # в начале и декодируем
      return decodeURIComponent(hash.substring(1));
    }

    // Если ничего нет — возвращаем пример по умолчанию
    return DOT_PO_UMOLCHANIYU;
  }

  // ========================================================
  // Извлекаем все URL изображений из кода dot
  // Ищем атрибуты вида: image="https://..." или image='...'
  // Возвращаем массив строк-URL (без дубликатов)
  // ========================================================
  function izvlech_url_izobrazheny(dotKod) {
    var spIsok = [];
    // Регулярное выражение: ищем image="..." или image='...'
    var regex = /image\s*=\s*["']([^"']+)["']/gi;
    var sovpadenie;
    while ((sovpadenie = regex.exec(dotKod)) !== null) {
      var url = sovpadenie[1];
      // Добавляем только если ещё не в списке
      if (spIsok.indexOf(url) === -1) {
        spIsok.push(url);
      }
    }
    return spIsok;
  }

  // ========================================================
  // Загружаем одно изображение и получаем его размеры
  // Возвращает Promise, который резолвится объектом {url, width, height}
  // ========================================================
  function zagrusit_izobrazhenie(url) {
    return new Promise(function(resolve) {
      var img = new Image();

      img.onload = function() {
        resolve({
          url: url,
          width: img.naturalWidth,
          height: img.naturalHeight
        });
      };

      img.onerror = function() {
        // Если изображение не загрузилось — используем размеры по умолчанию
        // Это позволяет продолжить рендеринг даже при ошибке загрузки
        console.warn('Не удалось загрузить изображение: ' + url);
        resolve({
          url: url,
          width: 100,
          height: 100
        });
      };

      img.src = url;
    });
  }

  // ========================================================
  // Главная функция: рендеринг dot-кода в SVG
  // 1. Извлекаем все URL изображений из кода
  // 2. Загружаем их для получения реальных размеров
  // 3. Передаём через опцию images в viz.renderString()
  //    (аналогично family-tree/ver2 — обеспечивает корректное
  //     отображение узлов с image=, imagepos=tc, labelloc=b)
  // 4. Вставляем SVG в страницу
  // ========================================================
  function zapustit() {
    // Получаем текущий код dot из редактора
    var dotKod = document.getElementById('dot-editor').value;

    // Очищаем предыдущее сообщение об ошибке
    document.getElementById('error-msg').textContent = '';

    // Извлекаем все URL изображений
    var urlIzobrazheny = izvlech_url_izobrazheny(dotKod);

    if (urlIzobrazheny.length === 0) {
      // Изображений нет — рендерим без передачи images
      vypolnit_render(dotKod, []);
    } else {
      // Загружаем все изображения параллельно для получения реальных размеров
      var obeshchaniya = [];
      for (var i = 0; i < urlIzobrazheny.length; i++) {
        obeshchaniya.push(zagrusit_izobrazhenie(urlIzobrazheny[i]));
      }

      Promise.all(obeshchaniya).then(function(razmery) {
        // Формируем массив объектов для опции images в viz.renderString()
        // Формат: [{name: 'url', width: px, height: px}, ...]
        var imagesOption = [];
        for (var j = 0; j < razmery.length; j++) {
          imagesOption.push({
            name: razmery[j].url,
            width: razmery[j].width,
            height: razmery[j].height
          });
        }
        vypolnit_render(dotKod, imagesOption);
      });
    }
  }

  // ========================================================
  // Выполняет непосредственный рендеринг через @viz-js/viz
  // imagesOption — массив объектов {name, width, height}
  //
  // Использует тот же подход, что family-tree/ver2/index.html:
  //   viz.renderString(dotStr, { format: 'svg', engine: '...', images: [...] })
  // Это обеспечивает правильный layout узлов с image=, imagepos=tc, labelloc=b
  // ========================================================
  function vypolnit_render(dotKod, imagesOption) {
    var dvizhok = document.getElementById('engine-select').value;
    var graphDiv = document.getElementById('graph');

    // Используем @viz-js/viz — тот же движок, что в family-tree/ver2
    // Опция images регистрирует размеры изображений в WASM до рендеринга
    Viz.instance().then(function(viz) {
      try {
        var svgStr = viz.renderString(dotKod, {
          format: 'svg',
          engine: dvizhok,
          images: imagesOption
        });
        graphDiv.innerHTML = svgStr;

        // Применяем текущий масштаб к новому SVG
        primenit_masshtab();

      } catch (oshibka) {
        document.getElementById('error-msg').textContent = 'Ошибка: ' + oshibka.message;
        console.error(oshibka);
      }
    }).catch(function(oshibka) {
      document.getElementById('error-msg').textContent = 'Ошибка инициализации: ' + oshibka.message;
      console.error(oshibka);
    });
  }

  // ========================================================
  // Формирует и отображает URL с текущим кодом dot
  // Параметр передаётся как хэш (#...) для совместимости
  // со стандартным поведением dreampuf/GraphvizOnline
  // ========================================================
  function sozdat_ssylku() {
    var dotKod = document.getElementById('dot-editor').value;
    // Кодируем код dot для безопасной передачи в URL
    var encoded = encodeURIComponent(dotKod);
    var base = window.location.origin + window.location.pathname;
    var ssylka = base + '#' + encoded;

    // Показываем ссылку под редактором
    document.getElementById('share-hint').textContent = ssylka;

    // Также копируем в буфер обмена (если браузер поддерживает)
    if (navigator.clipboard) {
      navigator.clipboard.writeText(ssylka).then(function() {
        document.getElementById('share-hint').textContent = 'Скопировано: ' + ssylka;
      }).catch(function() {
        // Тихо игнорируем ошибку копирования
      });
    }
  }

  // ========================================================
  // Скачивает текущий SVG-граф как файл
  // ========================================================
  function skachat_svg() {
    var svgElement = document.querySelector('#graph svg');
    if (!svgElement) {
      alert('Сначала отрисуйте граф');
      return;
    }

    // Сериализуем SVG в строку
    var serializer = new XMLSerializer();
    var svgStr = serializer.serializeToString(svgElement);

    // Создаём Blob и ссылку для скачивания
    var blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'graph.svg';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ========================================================
  // Управление масштабом: применяет текущий масштаб к SVG
  // ========================================================
  function primenit_masshtab() {
    var svgElement = document.querySelector('#graph svg');
    if (!svgElement) return;

    svgElement.style.transform = 'scale(' + tekuschiy_masshtab + ')';
    svgElement.style.transformOrigin = 'top left';
    document.getElementById('zoom-level').textContent = Math.round(tekuschiy_masshtab * 100) + '%';
  }

  // ========================================================
  // Изменяет масштаб на указанный шаг (положительный — увеличение,
  // отрицательный — уменьшение)
  // ========================================================
  function izmenity_masshtab(shag) {
    tekuschiy_masshtab = Math.min(5.0, Math.max(0.1, tekuschiy_masshtab + shag));
    // Округляем до одного знака после запятой во избежание накопления ошибок
    tekuschiy_masshtab = Math.round(tekuschiy_masshtab * 10) / 10;
    primenit_masshtab();
  }

  // ========================================================
  // Сбрасывает масштаб до 100%
  // ========================================================
  function sbrosit_masshtab() {
    tekuschiy_masshtab = 1.0;
    primenit_masshtab();
  }

  // ========================================================
  // Вписывает граф в видимую область правой панели
  // ========================================================
  function vpisat_v_okno() {
    var svgElement = document.querySelector('#graph svg');
    if (!svgElement) return;

    var panel = document.getElementById('graph-scroll');
    var panelW = panel.clientWidth - 20;
    var panelH = panel.clientHeight - 20;

    // Получаем размеры SVG без текущего масштабирования
    var masshtab1 = 1.0 / tekuschiy_masshtab;
    var svgW = svgElement.getBoundingClientRect().width * masshtab1;
    var svgH = svgElement.getBoundingClientRect().height * masshtab1;

    if (svgW <= 0 || svgH <= 0) return;

    var masshtabX = panelW / svgW;
    var masshtabY = panelH / svgH;
    tekuschiy_masshtab = Math.min(masshtabX, masshtabY, 1.0);
    tekuschiy_masshtab = Math.round(tekuschiy_masshtab * 100) / 100;
    primenit_masshtab();
  }

  // ========================================================
  // Инициализация при загрузке страницы
  // ========================================================
  function init() {
    // Загружаем код dot из URL или используем пример по умолчанию
    var dotKod = poluchit_dot_iz_url();
    document.getElementById('dot-editor').value = dotKod;

    // Автоматически отрисовываем граф при загрузке
    zapustit();
  }

  // Запускаем инициализацию после загрузки DOM
  window.onload = init;
</script>

</body>
</html>
